default: &default
  adapter: redis
  url: redis://localhost:6379

development:
  adapter: <%= ENV.fetch("ACTION_CABLE_ADAPTER", "async") %>
  <% if ENV.fetch("ACTION_CABLE_ADAPTER", "async") == "redis" %>
  url: <%= ENV.fetch("ACTION_CABLE_REDIS_URL", "redis://localhost:6379") %>
  <% end %>
  channel_prefix: campfire_development

test:
  adapter: test

performance:
  <<: *default
  channel_prefix: campfire_performance

production:
  <<: *default
  channel_prefix: campfire_production
